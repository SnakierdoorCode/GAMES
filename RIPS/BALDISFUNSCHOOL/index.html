<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL | Baldi's Fun New School</title>
    <style>
        html, body { 
            background: #000; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            padding: 0; 
            margin: 0; 
        }
        #unity-container { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        #unity-canvas { 
            width: 100%; 
            height: 100%; 
            background: #231f20; 
        }
        #loading-overlay { 
            position: absolute; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            z-index: 10;
        }
        #ripped-text {
            color: #ff0000;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #bar-bg { width: 300px; background: #333; height: 10px; border-radius: 5px; margin-top: 10px; }
        #bar-fill { width: 0%; height: 100%; background: #4CAF50; border-radius: 5px; }
        
        /* Bottom Right Tag */
        #credit-tag {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 0, 0, 0.6);
            font-family: sans-serif;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="loading-overlay">
            <div id="ripped-text">Ripped by Musashi</div>
            <div id="status">INITIATING DOWNLOAD...</div>
            <div id="bar-bg"><div id="bar-fill"></div></div>
        </div>
    </div>

    <div id="credit-tag">Ripped by Musashi</div>

    <script src="Build/BFNSPUE Alpha 6 Part 2b WebGL.loader.js"></script>

    <script>
        const canvas = document.querySelector("#unity-canvas");
        const statusText = document.querySelector("#status");
        const barFill = document.querySelector("#bar-fill");
        const loadingOverlay = document.querySelector("#loading-overlay");

        const buildPath = "Build/";
        const fileName = "BFNSPUE Alpha 6 Part 2b WebGL";
        const DATA_PARTS = 8; 
        const WASM_PARTS = 2;

        let totalBytes = 250000000; // Estimated total size
        let loadedBytes = 0;

        function getPartsList(baseName, count) {
            const list = [];
            for (let i = 1; i <= count; i++) list.push(`${baseName}.part${i}`);
            return list;
        }

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Missing: ${url}`);
            const reader = response.body.getReader();
            const chunks = [];
            let received = 0;
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                loadedBytes += value.length;
                const percent = ((loadedBytes / totalBytes) * 100).toFixed(1);
                statusText.textContent = `Downloading: ${percent}%`;
                barFill.style.width = percent + "%";
            }
            return new Uint8Array(await new Blob(chunks).arrayBuffer());
        }

        async function mergeAndCreateUrl(parts, mimeType) {
            const buffers = [];
            for (const part of parts) buffers.push(await fetchWithProgress(part));
            return URL.createObjectURL(new Blob(buffers, { type: mimeType }));
        }

        (async () => {
            try {
                const dataFiles = getPartsList(`${buildPath}${fileName}.data`, DATA_PARTS);
                const wasmFiles = getPartsList(`${buildPath}${fileName}.wasm`, WASM_PARTS);
                const frameworkFile = `${buildPath}${fileName}.framework.js`;

                const [dataUrl, wasmUrl, frameworkUrl] = await Promise.all([
                    mergeAndCreateUrl(dataFiles, "application/octet-stream"),
                    mergeAndCreateUrl(wasmFiles, "application/wasm"),
                    mergeAndCreateUrl([frameworkFile], "application/javascript")
                ]);

                const config = {
                    dataUrl: dataUrl,
                    frameworkUrl: frameworkUrl,
                    codeUrl: wasmUrl,
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "JohnsterSpaceGames",
                    productName: "Baldi's Fun New School Plus Ultimate Edition",
                    productVersion: "0.2.5b",
                    matchWebGLToCanvasSize: true, 
                    devicePixelRatio: window.devicePixelRatio || 1,
                };

                createUnityInstance(canvas, config, (progress) => {
                    if (progress === 1) statusText.textContent = "Launching...";
                }).then((instance) => {

                    loadingOverlay.remove();
                });

            } catch (err) {
                statusText.innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
            }
        })();
    </script>
</body>
</html>
