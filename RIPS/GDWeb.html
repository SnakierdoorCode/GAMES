<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Web Dashers | System Port</title>
    <base href="https://web-dashers.github.io/">
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
        }
        #boot-log { 
            position: absolute; bottom: 15px; left: 15px; 
            font-size: 11px; z-index: 100; 
            text-transform: uppercase; letter-spacing: 1px; 
        }
        canvas { display: block; margin: 0 auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <div id="boot-log">Initializing System...</div>

    <script>
        const REPO = "https://web-dashers.github.io/";
        window._gdProxyUrl = "https://gd-proxy.gmdc.workers.dev";

        const log = document.getElementById('boot-log');

        const scriptQueue = [
            "assets/scripts/game/allObjects.js",
            "assets/scripts/game/allLevels.js",
            "assets/scripts/utils/cache-manager.js",
            "assets/scripts/api/GDapiWrapper.js",
            "assets/scripts/utils/config.js",
            "assets/scripts/core/triggers.js",
            "assets/scripts/core/level.js",
            "assets/scripts/core/player.js",
            "assets/scripts/core/audio.js",
            "assets/scripts/core/loading-screen.js",
            "assets/scripts/core/game-scene.js",
            "assets/scripts/core/main.js"
        ];

        function applyGlobalFixes() {
            if (!window.Phaser) return;

            const fixPath = (url) => {
                if (!url || typeof url !== 'string' || url.startsWith('http') || url.startsWith('data:')) {
                    return url;
                }
                return REPO + url.replace(/^\//, '');
            };


            const loader = Phaser.Loader.LoaderPlugin.prototype;
            
            const methods = ['image', 'spritesheet', 'atlas', 'multiatlas', 'json', 'audio'];
            methods.forEach(method => {
                if (!loader[method]) return;
                const original = loader[method];
                loader[method] = function(key, url, ...args) {
                    if (typeof url === 'string') url = fixPath(url);
                    else if (Array.isArray(url)) url = url.map(fixPath);
                    return original.call(this, key, url, ...args);
                };
            });


            const origAddFile = loader.addFile;
            loader.addFile = function(file) {
                if (file.url) file.url = fixPath(file.url);
                if (file.textureURL) file.textureURL = fixPath(file.textureURL);
                if (file.atlasURL) file.atlasURL = fixPath(file.atlasURL);
                return origAddFile.call(this, file);
            };

            function createStrongFallbacks(scene) {
                if (!scene || !scene.textures) return;
                const textures = scene.textures;

                if (!textures.exists('square')) {
                    const gfx = scene.make.graphics({ x: 0, y: 0, add: false });
                    gfx.fillStyle(0x00ff88, 1);     // Bright green
                    gfx.lineStyle(4, 0x000000, 1);  // Black border
                    gfx.fillRect(0, 0, 48, 48);
                    gfx.strokeRect(4, 4, 40, 40);
                    gfx.generateTexture('square', 48, 48);
                }


                if (!textures.exists('missing')) {
                    const gfx = scene.make.graphics({ x: 0, y: 0, add: false });
                    gfx.fillStyle(0xff00ff, 0.9);
                    gfx.fillRect(0, 0, 64, 64);
                    gfx.lineStyle(6, 0xffff00, 1);
                    gfx.strokeRect(8, 8, 48, 48);
                    gfx.generateTexture('missing', 64, 64);
                }


                try {
                    const missing = textures.get('__MISSING');
                    if (missing) {
                        missing.setTexture(textures.get('square'));
                    }
                } catch(e) {}


                const commonKeys = ['player', 'icon', 'coin', 'portal', 'orb', 'pad', 'background', 'ground', 'spike'];
                commonKeys.forEach(key => {
                    if (!textures.exists(key)) {
                        textures.addImage(key, textures.get('square').getSourceImage());
                    }
                });
            }


            const originalCreate = Phaser.Scene.prototype.create;
            Phaser.Scene.prototype.create = function() {
                createStrongFallbacks(this);
                if (originalCreate) originalCreate.call(this);
            };


            setTimeout(() => {
                if (window.game && window.game.scene) {
                    const scenes = window.game.scene.getScenes();
                    scenes.forEach(scene => createStrongFallbacks(scene));
                }
            }, 600);
        }

        function loadScripts(index) {
            if (index >= scriptQueue.length) {
                log.innerText = "System Online.";
                setTimeout(() => log.style.display = 'none', 1500);
                return;
            }

            const path = scriptQueue[index];
            log.innerText = `Loading: ${path.split('/').pop()}`;

            const s = document.createElement('script');
            s.src = REPO + path;
            s.async = false;
            s.onload = () => loadScripts(index + 1);
            s.onerror = () => {
                log.innerText = `Failed: ${path.split('/').pop()}`;
                log.style.color = "#ff0000";
            };
            document.head.appendChild(s);
        }

        // Bootstrap
        const init = setInterval(() => {
            if (window.Phaser) {
                clearInterval(init);
                applyGlobalFixes();
                loadScripts(0);
            }
        }, 50);

        // Utilities
        window.addEventListener('resize', () => window.dispatchEvent(new Event('resize')));
        document.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
