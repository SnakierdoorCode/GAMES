<!DOCTYPE html>
<html lang="en-us">
  <head>
     <base href="https://cdn.jsdelivr.net/gh/SnakierdoorCode/Games@main/Ports/MINUS3/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | -3</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">-3</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/MINUS3.loader.js";
      
      var config = {
        dataUrl: "",
        frameworkUrl: "",
        codeUrl: "",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Mauzer2137",
        productName: "-3",
        productVersion: "3.-3",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
        unityShowBanner('WebGL builds are not supported on mobile devices.');
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }
      loadingBar.style.display = "block";

      function fetchPart(url) {
        return new Promise(function(resolve, reject) {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", url, true);
          xhr.responseType = "arraybuffer";
          xhr.onload = function() {
            if (xhr.status === 200 || xhr.status === 206) {
              resolve(new Uint8Array(xhr.response));
            } else {
              reject(new Error("Could not load file: " + url + " (status " + xhr.status + ")"));
            }
          };
          xhr.onerror = function() {
            reject(new Error("Network error loading file: " + url));
          };
          xhr.send();
        });
      }

      async function mergeAndCreateUrl(parts, mimeType) {
        var buffers = [];
        for (var i = 0; i < parts.length; i++) {
          buffers.push(await fetchPart(parts[i]));
        }
        var finalBlob = new Blob(buffers, { type: mimeType });
        return URL.createObjectURL(finalBlob);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = async () => {
        try {
          var dataParts = [
            buildUrl + "/MINUS3.data.part1",
            buildUrl + "/MINUS3.data.part2",
            buildUrl + "/MINUS3.data.part3",
            buildUrl + "/MINUS3.data.part4",
            buildUrl + "/MINUS3.data.part5"
          ];
          var frameworkFile = buildUrl + "/MINUS3.framework.js";
          var wasmFile = buildUrl + "/MINUS3.wasm";

          var dataBlobUrl = await mergeAndCreateUrl(dataParts, "application/octet-stream");
          var frameworkBlobUrl = await mergeAndCreateUrl([frameworkFile], "application/javascript");
          var wasmBlobUrl = await mergeAndCreateUrl([wasmFile], "application/wasm");

          config.dataUrl = dataBlobUrl;
          config.frameworkUrl = frameworkBlobUrl;
          config.codeUrl = wasmBlobUrl;

          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        } catch (err) {
          alert("Merge error: " + err.message);
        }
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
